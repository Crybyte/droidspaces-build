name: crDroid++ Kernel Build (Droidspaces + KSU-Next + susfs + GPU OC + UFW)

on:
  workflow_dispatch:
    inputs:
      crdroid_branch:
        description: 'crDroid branch to build'
        required: true
        default: '15.0'
        type: string
      kernelsu_version:
        description: 'KernelSU-Next version'
        required: true
        default: 'v1.0.7'
        type: choice
        options:
          - v1.0.7
          - v1.0.6
          - v3.0.0
      gpu_oc_level:
        description: 'GPU overclock level (crDroid++ uses 812MHz)'
        required: true
        default: 'stock'
        type: choice
        options:
          - stock
          - crdroid++
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  KERNEL_REPO: https://github.com/crdroidandroid/android_kernel_oneplus_sdm845.git
  DEVICE: enchilada
  ANDROID_VERSION: "15.0"
  BUILD_USER: github-actions
  BUILD_HOST: crdroid-plus-build

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    permissions:
      contents: write  # Required to create releases
    
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-scripts

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make gcc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi unzip cpio
          mkdir -p ~/kernel-build

      - name: Clone kernel source
        run: |
          cd ~/kernel-build
          git clone --depth 1 --branch ${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }} \
            ${{ env.KERNEL_REPO }} android_kernel_oneplus_sdm845

      - name: Add KernelSU-Next
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Adding KernelSU-Next ${{ github.event.inputs.kernelsu_version }} ==="
          # KernelSU-Next setup from the 'next' branch (crDroid++ uses this)
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_version }}
          
          # Verify KernelSU-Next was added - check for symlink or directory
          # The setup script creates a symlink 'KernelSU' -> 'KernelSU-Next'
          if [ ! -e "KernelSU" ]; then
            echo "KernelSU not created by setup script, cloning manually..."
            # Remove any broken symlink if exists
            rm -f KernelSU
            # Clone using the version tag (not 'next' branch)
            KSU_VERSION="${{ github.event.inputs.kernelsu_version }}"
            git clone --depth 1 --branch "$KSU_VERSION" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
          fi
          
          # Verify it worked
          echo "=== KernelSU directory check ==="
          ls -la KernelSU/ 2>/dev/null || { echo "ERROR: KernelSU directory missing!"; exit 1; }
          echo "=== KernelSU Makefile check ==="
          cat KernelSU/kernel/Makefile 2>/dev/null | head -5 || { echo "ERROR: KernelSU Makefile missing!"; exit 1; }
          
          # FIX: Patch KernelSU for kernel 4.9 compatibility
          # path_umount() doesn't exist in kernel 4.9 (introduced in 5.x)
          echo "=== Patching KernelSU for kernel 4.9 compatibility ==="
          
          # CRITICAL FIX: The setup.sh creates KernelSU-Next and symlinks drivers/kernelsu -> KernelSU-Next/kernel
          # If we manually cloned to KernelSU, we need to update the symlink to point to the right place
          echo "=== Setting up KernelSU symlink ==="
          if [ -d "KernelSU" ] && [ -L "drivers/kernelsu" ]; then
            echo "Fixing kernelsu symlink to point to KernelSU/kernel..."
            rm -f drivers/kernelsu
            ln -sf "$(realpath --relative-to="drivers" "KernelSU/kernel")" drivers/kernelsu
            echo "Symlink updated: drivers/kernelsu -> $(readlink drivers/kernelsu)"
          fi
          
          # CRITICAL FIX v26: Ensure symlink points to the correct location BEFORE determining KSU_KERNEL_DIR
          # The order matters - we must update the symlink first, then read its target
          echo "=== Verifying KernelSU symlink ==="
          ls -la drivers/kernelsu 2>/dev/null || echo "drivers/kernelsu not found"
          
          # Determine which kernel directory to patch
          # Priority: drivers/kernelsu (what's actually being compiled) -> KernelSU-Next/kernel -> KernelSU/kernel
          KSU_KERNEL_DIR=""
          if [ -d "drivers/kernelsu" ]; then
            # Get the real path of the symlink
            KSU_REAL_PATH=$(readlink -f drivers/kernelsu 2>/dev/null || echo "")
            if [ -n "$KSU_REAL_PATH" ]; then
              KSU_KERNEL_DIR="$KSU_REAL_PATH"
              echo "Found kernelsu at: $KSU_KERNEL_DIR"
            fi
          fi
          
          # Also check KernelSU-Next/kernel directly
          if [ -z "$KSU_KERNEL_DIR" ] && [ -d "KernelSU-Next/kernel" ]; then
            KSU_KERNEL_DIR="KernelSU-Next/kernel"
            echo "Using KernelSU-Next/kernel"
          fi
          
          # Fallback to KernelSU/kernel
          if [ -z "$KSU_KERNEL_DIR" ] && [ -d "KernelSU/kernel" ]; then
            KSU_KERNEL_DIR="KernelSU/kernel"
            echo "Using KernelSU/kernel"
          fi
          
          if [ -z "$KSU_KERNEL_DIR" ]; then
            echo "ERROR: Could not find KernelSU kernel directory!"
            exit 1
          fi
          
          # Find all .c and .h files in the kernel directory and patch them
          PATCH_COUNT=0
          for file in "$KSU_KERNEL_DIR"/*.c "$KSU_KERNEL_DIR"/*.h; do
            if [ -f "$file" ]; then
              FILE_NAME=$(basename "$file")
              
              # Create a backup
              cp "$file" "${file}.bak"
              
              # Count occurrences of path_umount
              PATH_UMOUNT_COUNT=$(grep -c "path_umount" "$file" 2>/dev/null || echo "0")
              
              if [ "$PATH_UMOUNT_COUNT" -gt 0 ]; then
                echo "Found $PATH_UMOUNT_COUNT occurrences of path_umount in $FILE_NAME"
                echo "Applying path_umount kernel 4.9 compatibility patch..."
                
                # AGGRESSIVE path_umount patching for kernel 4.9
                # path_umount was introduced in kernel 5.9, doesn't exist in 4.9
                # We need to replace path_umount(path, flags) with umount(path)
                
                # Strategy 1: Perl regex to handle path_umount(anything, flags)
                perl -i -pe 's/path_umount\s*\(\s*([^,]+)\s*,\s*([^)]+)\s*\)/umount($1)/g' "$file"
                
                # Strategy 2: Alternative pattern with different spacing
                perl -i -pe 's/path_umount\s*\(\s*([^,\s]+)\s*,[^)]+\)/umount($1)/g' "$file"
                
                # Strategy 3: Line-by-line replacement using sed for remaining cases
                # This handles edge cases perl might miss
                sed -i 's/path_umount[[:space:]]*(/umount(/g' "$file"
                
                # Remove the second argument (flags) - common patterns
                sed -i 's/,[[:space:]]*MNT_DETACH[[:space:]]*)/)/g' "$file"
                sed -i 's/,[[:space:]]*0[[:space:]]*)/)/g' "$file"
                sed -i 's/,[[:space:]]*UMOUNT_NOFOLLOW[[:space:]]*)/)/g' "$file"
                
                # Verify the patch was applied
                REMAINING=$(grep -c "path_umount" "$file" 2>/dev/null || echo "0")
                if [ "$REMAINING" -gt 0 ]; then
                  echo "WARNING: $REMAINING path_umount calls still found in $FILE_NAME after patching!"
                  grep -n "path_umount" "$file" | head -10
                  echo "ERROR: Failed to patch all path_umount calls"
                  exit 1
                else
                  echo "SUCCESS: All path_umount calls replaced in $FILE_NAME"
                  PATCH_COUNT=$((PATCH_COUNT + PATH_UMOUNT_COUNT))
                fi
              fi
              
              # FIX: KERNEL_VERSION macro requires 3 arguments in kernel 4.9
              # Replace KERNEL_VERSION(a, b) with KERNEL_VERSION(a, b, 0)
              KERNEL_VER_COUNT=$(grep -c 'KERNEL_VERSION[[:space:]]*(' "$file" 2>/dev/null || echo "0")
              if [ "$KERNEL_VER_COUNT" -gt 0 ]; then
                echo "Found KERNEL_VERSION usage in $FILE_NAME - checking for 2-arg calls..."
                # Count 2-argument calls (pattern: KERNEL_VERSION(num, num))
                TWO_ARG_COUNT=$(grep -oE 'KERNEL_VERSION[[:space:]]*\([[:space:]]*[0-9]+[[:space:]]*,[[:space:]]*[0-9]+[[:space:]]*\)' "$file" 2>/dev/null | wc -l || echo "0")
                if [ "$TWO_ARG_COUNT" -gt 0 ]; then
                  echo "Found $TWO_ARG_COUNT 2-argument KERNEL_VERSION calls - patching..."
                  # Replace KERNEL_VERSION(x, y) with KERNEL_VERSION(x, y, 0)
                  perl -i -pe 's/KERNEL_VERSION\s*\(\s*([0-9]+)\s*,\s*([0-9]+)\s*\)/KERNEL_VERSION($1, $2, 0)/g' "$file"
                  echo "Patched KERNEL_VERSION calls in $FILE_NAME"
                fi
              fi
              
              # FIX: try_umount function signature in kernel 4.9
              # try_umount(path, flags) became try_umount(path) in older kernels
              TRY_UMOUNT_COUNT=$(grep -c 'try_umount' "$file" 2>/dev/null || echo "0")
              if [ "$TRY_UMOUNT_COUNT" -gt 0 ]; then
                echo "Found try_umount usage in $FILE_NAME - checking arguments..."
                # Check if try_umount is being called with 3 arguments (v1.0.7 style)
                THREE_ARG_TRY=$(grep -oE 'try_umount[[:space:]]*\([^,]+,[^,]+,[^)]+\)' "$file" 2>/dev/null | wc -l || echo "0")
                if [ "$THREE_ARG_TRY" -gt 0 ]; then
                  echo "Found 3-argument try_umount calls - patching..."
                  # Replace try_umount(path, check_mnt, flags) - just use the path argument
                  perl -i -pe 's/try_umount\s*\(\s*([^,]+)\s*,[^,]+,[^)]+\)/try_umount($1, false, 0)/g' "$file"
                  echo "Patched 3-arg try_umount calls in $FILE_NAME"
                fi
                # Check if try_umount is being called with 2 arguments
                TWO_ARG_TRY=$(grep -oE 'try_umount[[:space:]]*\([^,]+,[^)]+\)' "$file" 2>/dev/null | wc -l || echo "0")
                if [ "$TWO_ARG_TRY" -gt 0 ]; then
                  echo "Found 2-argument try_umount calls - patching to 1 argument..."
                  # Replace try_umount(path, flags) with try_umount(path)
                  perl -i -pe 's/try_umount\s*\(\s*([^,]+)\s*,[^)]+\)/try_umount($1)/g' "$file"
                  echo "Patched try_umount calls in $FILE_NAME"
                fi
              fi
              
              # FIX: check_mnt variable issues in kernel 4.9
              # Replace check_mnt with 0 in function context
              if grep -q "check_mnt" "$file" 2>/dev/null; then
                echo "Found check_mnt in $FILE_NAME - patching..."
                # Replace check_mnt with false (0) to avoid undeclared errors
                perl -i -pe 's/\bcheck_mnt\b/false/g' "$file"
              fi
            fi
          done
          
          # CRITICAL FIX v29: Comprehensive fix for kernel 4.9 compatibility

          # NOTE: Intermediate fixes v29-v38 consolidated into v39
          echo "=== CRITICAL FIX v39: FINAL aggressive umount -> sys_umount fix ==="

          if [ -f "$GITHUB_WORKSPACE/build-scripts/fix_kernelsu_49_v39.py" ]; then
            echo "Running kernel 4.9 compatibility fix script v39 (FINAL)..."
            KERNEL_DIR=~/kernel-build/android_kernel_oneplus_sdm845 python3 "$GITHUB_WORKSPACE/build-scripts/fix_kernelsu_49_v39.py" ~/kernel-build/android_kernel_oneplus_sdm845
          elif [ -f "$GITHUB_WORKSPACE/fix_kernelsu_49_v39.py" ]; then
            echo "Running kernel 4.9 compatibility fix script v39 from repo root..."
            KERNEL_DIR=~/kernel-build/android_kernel_oneplus_sdm845 python3 "$GITHUB_WORKSPACE/fix_kernelsu_49_v39.py" ~/kernel-build/android_kernel_oneplus_sdm845
          fi

          # Verification: Show line 591 of core_hook.c to verify the fix
          echo "=== Verifying core_hook.c line 591 (flags fix) ==="
          CORE_HOOK_FILE=$(readlink -f drivers/kernelsu/core_hook.c 2>/dev/null || echo "")
          if [ -n "$CORE_HOOK_FILE" ] && [ -f "$CORE_HOOK_FILE" ]; then
            echo "core_hook.c line 591:"
            sed -n '591p' "$CORE_HOOK_FILE"
            # Check if it still contains 'flags' variable (not the parameter)
            if sed -n '591p' "$CORE_HOOK_FILE" | grep -q 'ksu_umount_mnt.*flags)'; then
              echo "WARNING: Line 591 still calls with 'flags' variable - build may fail!"
            else
              echo "OK: Line 591 call site is fixed"
            fi
          fi

          echo "=== Patching complete: $PATCH_COUNT path_umount calls replaced ==="
          
          # Verify the symlink is correct
          echo "=== Final verification ==="
          ls -la drivers/kernelsu 2>/dev/null || echo "drivers/kernelsu not found"
          echo "Symlink points to: $(readlink -f drivers/kernelsu 2>/dev/null || echo 'N/A')"
          
          # CRITICAL: Show line 591 of core_hook.c to verify the fix
          echo "=== Verifying core_hook.c line 591 (flags fix) ==="
          CORE_HOOK_FILE=$(readlink -f drivers/kernelsu/core_hook.c 2>/dev/null || echo "")
          if [ -n "$CORE_HOOK_FILE" ] && [ -f "$CORE_HOOK_FILE" ]; then
            echo "core_hook.c line 591:"
            sed -n '591p' "$CORE_HOOK_FILE"
            # Check if it still contains 'flags'
            if sed -n '591p' "$CORE_HOOK_FILE" | grep -q 'flags'; then
              echo "WARNING: Line 591 still contains 'flags' - build may fail!"
            else
              echo "OK: Line 591 does not contain 'flags'"
            fi
          else
            echo "WARNING: Could not find core_hook.c for verification"
          fi

      - name: Add susfs patches (DISABLED - causing build failures)
        if: github.event.inputs.kernelsu_version != 'v3.0.0'
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== SKIPPING susfs4ksu patches - causing kernel 4.9 compatibility issues ==="
          echo "Issue: susfs patches reference android_kabi_reserved fields that don't exist in kernel 4.9"
          echo "KernelSU-Next works without susfs - continuing with build..."
          echo ""
          echo "NOTE: susfs is optional for SafetyNet/Play Integrity hiding."
          echo "The kernel will work fine without it."
          
          # Mark susfs as skipped
          echo "SUSFS_SKIP=1" >> $GITHUB_ENV

      - name: Download and apply Droidspaces patches
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Applying Droidspaces patches ==="
          # Download Droidspaces patches
          curl -L -o droidspaces-patches.zip \
            https://github.com/ravindu644/Droidspaces-OSS/archive/refs/heads/main.zip
          
          # Extract and verify
          unzip -o droidspaces-patches.zip
          
          # Find the extracted directory
          DROIDSPACES_DIR=$(find . -maxdepth 1 -type d -name "Droidspaces-OSS*" | head -1)
          echo "Found Droidspaces directory: $DROIDSPACES_DIR"
          
          # Apply non-GKI patches for 4.x kernels
          if [ -d "$DROIDSPACES_DIR/non-GKI" ]; then
            for patch in $DROIDSPACES_DIR/non-GKI/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying patch: $patch"
                patch -p1 < "$patch" || echo "Patch failed (may already be applied): $patch"
              fi
            done
          fi
          
          # Store the directory name for next step
          echo "DROIDSPACES_DIR=$DROIDSPACES_DIR" >> $GITHUB_ENV

      - name: Apply crDroid++ GPU overclock patch
        if: github.event.inputs.gpu_oc_level == 'crdroid++'
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Applying crDroid++ GPU overclock (812MHz) ==="
          
          GPU_DTSI="arch/arm64/boot/dts/qcom/sdm845-gpu.dtsi"
          
          # Check current GPU freq format in the file
          echo "Current GPU frequencies in DTSI:"
          grep -n "qcom,gpu-freq" "$GPU_DTSI" | head -5 || echo "Pattern not found with grep"
          
          # crDroid++ uses 812MHz max GPU freq (stock is 600MHz)
          # Try multiple patterns to handle different DTSI formats
          
          # Pattern 1: Standard format <600000000>
          if grep -q "qcom,gpu-freq = <600000000>;" "$GPU_DTSI"; then
            sed -i 's/qcom,gpu-freq = <600000000>;/qcom,gpu-freq = <812000000>;/' "$GPU_DTSI"
            echo "Applied OC using pattern 1 (600000000)"
          # Pattern 2: Different spacing
          elif grep -q "qcom,gpu-freq=<600000000>" "$GPU_DTSI"; then
            sed -i 's/qcom,gpu-freq=<600000000>/qcom,gpu-freq=<812000000>/' "$GPU_DTSI"
            echo "Applied OC using pattern 2 (no spaces)"
          # Pattern 3: Try to find any 600MHz reference and replace
          elif grep -q "600000000" "$GPU_DTSI"; then
            sed -i 's/600000000/812000000/g' "$GPU_DTSI"
            echo "Applied OC by replacing all 600000000 with 812000000"
          else
            echo "WARNING: Could not find 600MHz GPU frequency reference"
            echo "Available GPU-related settings:"
            grep -n "gpu-freq\|pwrlevel" "$GPU_DTSI" | head -10 || true
          fi
          
          # Verify the change (non-fatal)
          echo "Verifying GPU OC patch:"
          grep -A 1 "gpu-pwrlevel@0" "$GPU_DTSI" | grep "qcom,gpu-freq" || \
          grep "812000000" "$GPU_DTSI" | head -3 || \
          echo "Verification: checking final state..."
          
          echo "GPU overclock attempt completed"

      - name: Setup kernel configuration
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Setting up kernel configuration ==="
          
          # Start with enchilada defconfig
          make O=out ARCH=arm64 enchilada_defconfig
          
          # Create comprehensive config fragment (crDroid++ style)
          cat > /tmp/crdroid-plus.config << 'EOF'
          # ===== KernelSU-Next Configuration =====
          CONFIG_KSU=y
          # Disable kprobes for manual hook integration (more stable on 4.9)
          CONFIG_KPROBES=n
          
          # ===== susfs (DISABLED - causing kernel 4.9 compatibility issues) =====
          # CONFIG_KSU_SUSFS is not set
          
          # ===== Droidspaces Container Support =====
          CONFIG_NAMESPACES=y
          CONFIG_UTS_NS=y
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_NET_PRIO=y
          CONFIG_CPUSETS=y
          CONFIG_MEMCG=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_NF_NAT=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_IP_NF_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_IPVS=y
          
          # ===== UFW/Fail2Ban Support (Netfilter) =====
          CONFIG_NETFILTER_XT_MATCH_LIMIT=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          CONFIG_NETFILTER_XT_MATCH_STATE=y
          CONFIG_NF_CONNTRACK=y
          CONFIG_NF_CONNTRACK_FTP=y
          CONFIG_NF_CONNTRACK_IRC=y
          CONFIG_NF_CONNTRACK_MARK=y
          CONFIG_NF_CONNTRACK_SECMARK=y
          CONFIG_NF_CONNTRACK_EVENTS=y
          CONFIG_NF_CT_NETLINK=y
          CONFIG_NF_NAT_FTP=y
          CONFIG_NF_NAT_IRC=y
          CONFIG_IP_NF_IPTABLES=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP6_NF_IPTABLES=y
          CONFIG_IP6_NF_FILTER=y
          
          # Additional container features
          CONFIG_POSIX_MQUEUE=y
          CONFIG_OVERLAY_FS=y
          CONFIG_FANOTIFY=y
          
          # Disable problematic options for 4.9
          CONFIG_BPF_SYSCALL=n
          CONFIG_CGROUP_BPF=n
          EOF
          
          # Apply the config fragment
          ./scripts/kconfig/merge_config.sh -m out/.config /tmp/crdroid-plus.config
          
          # Run oldconfig to resolve any new symbols
          make O=out ARCH=arm64 oldconfig < /dev/null || true
          
          echo "=== Configuration complete ==="
          grep "CONFIG_KSU" out/.config || echo "CONFIG_KSU not found in config!"

      - name: Build kernel
        env:
          ARCH: arm64
          SUBARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          CROSS_COMPILE_ARM32: arm-linux-gnueabi-
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Cleaning source directory ==="
          # Clean the source directory to fix ".. is not clean" error
          make mrproper 2>/dev/null || true
          
          echo "=== Building crDroid++ kernel ==="
          echo "CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32"
          
          # Export for make sub-processes
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Build with warnings suppressed (crDroid++ uses these flags)
          # Suppress common warnings that become errors on newer GCC
          # Single-line make command to avoid YAML escaping issues
          MAKE_ARGS="-j$(nproc) O=out ARCH=arm64"
          CC_ARGS="gcc -Wno-error=format -Wno-error=address -Wno-error=misleading-indentation -Wno-error=enum-int-mismatch -Wno-error=memset-elt-size -Wno-error=stringop-overread -Wno-error=duplicate-decl-specifier -Wno-error=array-parameter= -Wno-error=maybe-uninitialized -Wno-error=parentheses -Wno-error=int-in-bool-context"
          
          make $MAKE_ARGS CC="$CC_ARGS" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image.gz-dtb 2>&1 | tee build.log
          
          echo "=== Build complete ==="
          ls -la out/arch/arm64/boot/Image.gz-dtb || echo "Kernel image not found!"

      - name: Create AnyKernel3 zip
        if: success()
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          echo "=== Creating flashable zip ==="
          
          # Download AnyKernel3
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git anykernel
          
          # Copy kernel image
          cp out/arch/arm64/boot/Image.gz-dtb anykernel/
          
          # Update AnyKernel3 config for enchilada/fajita
          sed -i 's/do.devicecheck=1/do.devicecheck=1/' anykernel/anykernel.sh
          sed -i 's/device.name1=.*/device.name1=enchilada/' anykernel/anykernel.sh
          sed -i '/device.name1=.*/a device.name2=fajita' anykernel/anykernel.sh
          
          # Create zip
          cd anykernel
          zip -r9 ../crDroid++-kernel-${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }}.zip * -x .git README.md
          cd ..
          
          echo "=== Zip created ==="
          ls -lh *.zip

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crDroid++-kernel-${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }}
          path: ~/kernel-build/android_kernel_oneplus_sdm845/*.zip
          retention-days: 30

      - name: Create Release
        if: success() && github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: crdroid-plus-${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }}-${{ github.run_number }}
          name: crDroid++ Kernel ${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }} Build #${{ github.run_number }}
          body: |
            crDroid++ Kernel for OnePlus 6/6T (enchilada/fajita)
            
            **Configuration:**
            - crDroid: ${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }}
            - KernelSU-Next: ${{ github.event.inputs.kernelsu_version }}
            - GPU Overclock: ${{ github.event.inputs.gpu_oc_level }}
            - Droidspaces: Enabled
            - UFW/Fail2Ban: Enabled
            - susfs: Disabled (kernel 4.9 compatibility)
            
            **Features:**
            - Container support (Docker/LXC)
            - Full netfilter/iptables support
            - KernelSU-Next root management
            
            Flash via recovery (Magisk/KernelSU compatible)
          files: |
            ~/kernel-build/android_kernel_oneplus_sdm845/*.zip
          prerelease: ${{ github.event.inputs.build_type != 'release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure-${{ github.run_number }}
          path: ~/kernel-build/android_kernel_oneplus_sdm845/build.log
          retention-days: 7
