name: Droidspaces Kernel Build

on:
  workflow_dispatch:
    inputs:
      crdroid_branch:
        description: 'crDroid branch to build'
        required: true
        default: '15.0'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  KERNEL_REPO: https://github.com/crdroidandroid/android_kernel_oneplus_sdm845.git
  DEVICE: enchilada
  ANDROID_VERSION: "15.0"
  BUILD_USER: github-actions
  BUILD_HOST: droidspaces-build

jobs:
  build-kernel:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-scripts

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make gcc gcc-aarch64-linux-gnu unzip
          mkdir -p ~/kernel-build

      - name: Clone kernel source
        run: |
          cd ~/kernel-build
          git clone --depth 1 --branch ${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }} \
            ${{ env.KERNEL_REPO }} android_kernel_oneplus_sdm845

      - name: Download and apply Droidspaces patches
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          # Download Droidspaces patches
          curl -L -o droidspaces-patches.zip \
            https://github.com/ravindu644/Droidspaces-OSS/archive/refs/heads/main.zip
          
          # Extract and verify
          unzip -o droidspaces-patches.zip
          ls -la
          
          # Find the extracted directory (might be Droidspaces-OSS-main or similar)
          DROIDSPACES_DIR=$(find . -maxdepth 1 -type d -name "Droidspaces-OSS*" | head -1)
          echo "Found Droidspaces directory: $DROIDSPACES_DIR"
          
          # Apply non-GKI patches for 4.x kernels
          if [ -d "$DROIDSPACES_DIR/non-GKI" ]; then
            for patch in $DROIDSPACES_DIR/non-GKI/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying patch: $patch"
                patch -p1 < "$patch" || echo "Patch failed (may already be applied): $patch"
              fi
            done
          fi
          
          # Store the directory name for next step
          echo "DROIDSPACES_DIR=$DROIDSPACES_DIR" >> $GITHUB_ENV

      - name: Setup kernel configuration
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          # Start with crDroid defconfig
          make O=out ARCH=arm64 sdm845_defconfig
          
          # Apply Droidspaces Kconfig fragment if available
          if [ -f "${{ env.DROIDSPACES_DIR }}/configs/non-GKI.config" ]; then
            echo "Applying Droidspaces config fragment"
            cat "${{ env.DROIDSPACES_DIR }}/configs/non-GKI.config" >> out/.config
          else
            echo "Droidspaces config not found, applying minimal container config manually"
            # Minimal Droidspaces config for 4.9 kernels
            echo "CONFIG_NAMESPACES=y" >> out/.config
            echo "CONFIG_CGROUP_DEVICE=y" >> out/.config
            echo "CONFIG_CGROUP_PIDS=y" >> out/.config
            echo "CONFIG_MEMCG=y" >> out/.config
            echo "CONFIG_SECCOMP=y" >> out/.config
            echo "CONFIG_VETH=y" >> out/.config
            echo "CONFIG_BRIDGE=y" >> out/.config
            echo "CONFIG_BRIDGE_NETFILTER=y" >> out/.config
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> out/.config
            echo "CONFIG_OVERLAY_FS=y" >> out/.config
            echo "CONFIG_DEVTMPFS=y" >> out/.config
            echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> out/.config
          fi
          
          # Disable broken OnePlus debug driver
          echo "# CONFIG_OEM_FORCE_DUMP is not set" >> out/.config
          
          # Update config
          make O=out ARCH=arm64 olddefconfig

      - name: Build kernel
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Build kernel image only first (skip DTB for now)
          make -j$(nproc) O=out ARCH=arm64 \
            CC=gcc \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image.gz \
            2>&1 | tee build.log
          
      - name: Build device tree for enchilada
        run: |
          cd ~/kernel-build/android_kernel_oneplus_sdm845
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Only build enchilada PVT device tree (most common variant)
          make -j$(nproc) O=out ARCH=arm64 \
            CC=gcc \
            CROSS_COMPILE=aarch64-linux-gnu- \
            enchilada-pvt.dtb \
            2>&1 | tee -a build.log || echo "DTB build had warnings but continuing"

      - name: Upload kernel artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: |
            ~/kernel-build/android_kernel_oneplus_sdm845/out/arch/arm64/boot/Image.gz
            ~/kernel-build/android_kernel_oneplus_sdm845/out/arch/arm64/boot/enchilada-pvt.dtb
            ~/kernel-build/android_kernel_oneplus_sdm845/build.log
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log-${{ github.run_number }}
          path: ~/kernel-build/android_kernel_oneplus_sdm845/build.log
          retention-days: 7

      - name: Create Release
        if: github.event.inputs.build_type == 'release' && success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: droidspaces-${{ env.DEVICE }}-${{ github.run_number }}
          name: "Droidspaces Kernel ${{ env.DEVICE }} - Build #${{ github.run_number }}"
          body: |
            Automated build of crDroid kernel with Droidspaces support
            
            Device: ${{ env.DEVICE }}
            Branch: ${{ github.event.inputs.crdroid_branch || env.ANDROID_VERSION }}
            Build Date: ${{ github.event.head_commit.timestamp }}
            
            ## Installation
            1. Flash Image.gz-dtb to boot partition
            2. Flash dtbo.img to dtbo partition
            3. Reboot and install Droidspaces app
            
            ## Configuration
            - NAT mode enabled
            - cgroupfs + vfs drivers
            - ANDROID_PARANOID_NETWORK disabled
          files: |
            ~/kernel-build/android_kernel_oneplus_sdm845/out/arch/arm64/boot/Image.gz
            ~/kernel-build/android_kernel_oneplus_sdm845/out/arch/arm64/boot/enchilada-pvt.dtb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
